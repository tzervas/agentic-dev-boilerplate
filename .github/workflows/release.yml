name: Release & Publish

# Manual only — no push/pull_request CI triggers
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true
        type: string
jobs:
  release:
    runs-on: [self-hosted, linux, x64, podman]
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install build dependencies
        run: |
          uv add --dev build twine

      - name: Build package
        run: |
          uv build

      - name: Publish to PyPI
        run: |
          uv run twine upload --repository pypi dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes in this release

            See [CHANGELOG.md](https://github.com/tzervas/agentic-dev-boilerplate/blob/main/CHANGELOG.md) for details.

            ## Installation

            ```bash
            uv pip install agentic-dev-boilerplate
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
